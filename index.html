<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gishiki – Wellness / Recovery Ritual v1</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #191622 0%, #050608 45%, #020308 100%);
      color: #f7f8fa;
    }
    .card {
      border-radius: 18px;
      padding: 22px 20px 20px;
      background: rgba(7, 9, 16, 0.96);
      border: 1px solid #272d3c;
      width: min(460px, 100% - 32px);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(120, 140, 180, 0.18);
    }
    .title {
      font-size: 19px;
      margin: 0 0 6px;
      letter-spacing: 0.03em;
    }
    .subtitle {
      margin: 0 0 14px;
      font-size: 13px;
      color: #9ca6c0;
    }
    .section-label {
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: #7f8a9f;
      margin-bottom: 4px;
    }
    .question {
      margin: 8px 0 18px;
      font-size: 17px;
      line-height: 1.5;
    }
    .note {
      font-size: 12px;
      color: #9ca6c0;
      margin: 6px 0 10px;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    button {
      flex: 1;
      padding: 10px 14px;
      border-radius: 11px;
      border: 1px solid #2c3443;
      background: #151a23;
      color: #f7f8fa;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.06s ease, background 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease;
    }
    button.primary {
      background: #1f2834;
      border-color: #3b5ad1;
    }
    button.subtle {
      background: transparent;
      border-color: #31384a;
      color: #9ca6c0;
    }
    button:active {
      transform: translateY(1px);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid #31384a;
      background: rgba(10, 13, 20, 0.9);
      font-size: 11px;
      color: #aab4cc;
      margin-bottom: 10px;
    }
    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #4be1a5;
    }
    .suggestion {
      margin: 8px 0 12px;
      font-size: 15px;
      line-height: 1.5;
    }
    .tagline {
      font-size: 12px;
      color: #9ca6c0;
      margin-bottom: 4px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #31384a;
      font-size: 11px;
      color: #aab4cc;
      margin-right: 6px;
    }
    .state-pill {
      background: rgba(27, 32, 46, 0.9);
      border-color: #3c455a;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="badge-dot"></span><span>Wellness / Recovery Ritual</span></div>
    <h1 class="title">Gishiki</h1>
    <p class="subtitle">A short check-in when you feel overloaded.</p>

    <!-- Intro section -->
    <div id="intro-section">
      <div class="section-label">Opening</div>
      <p class="question">Take a slow breath. This will stay small and simple.</p>
      <p class="note">We’ll ask a few quiet questions and then offer one next step. You can always say no.</p>
      <div class="actions">
        <button id="intro-begin" class="primary">Begin</button>
        <button id="intro-later" class="subtle">Not now</button>
      </div>
    </div>

    <!-- Question section -->
    <div id="question-section" class="hidden">
      <div class="section-label">Check-in</div>
      <p id="question-text" class="question"></p>
      <p id="question-note" class="note"></p>
      <div class="actions">
        <button id="answer-yes" class="primary">Yes</button>
        <button id="answer-no" class="subtle">No</button>
      </div>
    </div>

    <!-- Result section -->
    <div id="result-section" class="hidden">
      <div class="section-label">Next step</div>
      <p id="result-text" class="suggestion"></p>
      <p id="result-tagline" class="tagline"></p>
      <div id="state-tags" class="note"></div>
      <div class="actions">
        <button id="result-accept" class="primary">Yes, I’ll do this</button>
        <button id="result-alt" class="subtle">Show another</button>
      </div>
      <div class="actions" style="margin-top:8px;">
        <button id="result-restart" class="subtle" style="flex:1;">Restart ritual</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var introSection = document.getElementById('intro-section');
      var questionSection = document.getElementById('question-section');
      var resultSection = document.getElementById('result-section');
      var questionText = document.getElementById('question-text');
      var questionNote = document.getElementById('question-note');
      var resultText = document.getElementById('result-text');
      var resultTagline = document.getElementById('result-tagline');
      var stateTagsEl = document.getElementById('state-tags');

      var introBeginBtn = document.getElementById('intro-begin');
      var introLaterBtn = document.getElementById('intro-later');
      var yesBtn = document.getElementById('answer-yes');
      var noBtn = document.getElementById('answer-no');
      var acceptBtn = document.getElementById('result-accept');
      var altBtn = document.getElementById('result-alt');
      var restartBtn = document.getElementById('result-restart');

      // --- Question model ---
      var questions = [
        {
          id: 'running_low',
          text: 'Are you running low right now?',
          note: 'Not a moral question. Just energy.',
          yes: { depleted: 2, needs_pause: 1 },
          no: { needs_action: 1 }
        },
        {
          id: 'body_attention',
          text: 'Does your body need attention?',
          note: 'Pain, tension, hunger, or aches all count.',
          yes: { body_needs: 2, tense: 1 },
          no: { avoidant_capable: 1 }
        },
        {
          id: 'slowing_down',
          text: 'Would slowing down help more than pushing through?',
          note: 'Answer from your gut, not your calendar.',
          yes: { needs_pause: 2, overstimulated: 1 },
          no: { needs_action: 2 }
        },
        {
          id: 'support_now',
          text: 'Do you want any support from outside yourself right now?',
          note: 'A person, a tool, or a small structure.',
          yes: { wants_support: 2, isolated: 1 },
          no: { self_reliant: 1 }
        },
        {
          id: 'practical_step',
          text: 'Would one practical next step help?',
          note: 'Nothing big. Just the very next move.',
          yes: { ready_for_step: 2 },
          no: { needs_rest_only: 2 }
        }
      ];

      // --- State ---
      var currentIndex = 0;
      var scores = {};

      function resetState() {
        currentIndex = 0;
        scores = {};
        stateTagsEl.innerHTML = '';
        resultText.textContent = '';
        resultTagline.textContent = '';
      }

      function updateScores(delta) {
        if (!delta) return;
        for (var key in delta) {
          if (!scores[key]) scores[key] = 0;
          scores[key] += delta[key];
        }
      }

      function nextQuestion() {
        if (currentIndex >= questions.length) {
          showResult();
          return;
        }
        var q = questions[currentIndex];
        questionText.textContent = q.text;
        questionNote.textContent = q.note;
      }

      function pickState() {
        var maxKey = null;
        var maxVal = -Infinity;
        for (var key in scores) {
          if (scores[key] > maxVal) {
            maxVal = scores[key];
            maxKey = key;
          }
        }
        return maxKey || 'needs_pause';
      }

      function renderStateTags() {
        var tags = Object.keys(scores)
          .sort(function(a, b) { return (scores[b] || 0) - (scores[a] || 0); })
          .slice(0, 3);
        stateTagsEl.innerHTML = '';
        tags.forEach(function(tag) {
          var pill = document.createElement('span');
          pill.className = 'pill state-pill';
          pill.textContent = tag.replace(/_/g, ' ');
          stateTagsEl.appendChild(pill);
        });
      }

      function showResult(overrideState) {
        var primaryState = overrideState || pickState();
        renderStateTags();

        var suggestion = '';
        var tagline = '';

        switch (primaryState) {
          case 'depleted':
          case 'needs_rest_only':
          case 'overstimulated':
            suggestion = 'Do not decide anything for the next 20 minutes.';
            tagline = 'Step away from screens. Let your nervous system come down first.';
            break;
          case 'body_needs':
          case 'tense':
            suggestion = 'Drink water and lie down for 10–15 minutes.';
            tagline = 'Let your body catch up before your mind takes on more.';
            break;
          case 'isolated':
          case 'wants_support':
            suggestion = 'Reach out to one person you trust and tell them one sentence about how you are.';
            tagline = 'You do not have to carry this alone. One small contact is enough for now.';
            break;
          case 'needs_action':
          case 'ready_for_step':
            suggestion = 'Choose one tiny task that moves you forward and give it 10 focused minutes.';
            tagline = 'No overhaul. Just one honest move in the direction you already care about.';
            break;
          case 'avoidant_capable':
            suggestion = 'Name the one thing you are avoiding and write down the next move without doing it yet.';
            tagline = 'Clarity before force. You can act after you have named it clearly.';
            break;
          case 'self_reliant':
            suggestion = 'Stay with yourself for a moment: breathe, feel your body, and notice one thing you actually want.';
            tagline = 'You do not owe anyone a performance right now. You only owe yourself honesty.';
            break;
          default:
            suggestion = 'This feels bigger than productivity. Consider seeking care, not just output.';
            tagline = 'When everything feels heavy at once, the next move might be support, not effort.';
        }

        resultText.textContent = suggestion;
        resultTagline.textContent = tagline;

        questionSection.classList.add('hidden');
        introSection.classList.add('hidden');
        resultSection.classList.remove('hidden');
      }

      // --- Wire buttons ---
      introBeginBtn.onclick = function () {
        introSection.classList.add('hidden');
        questionSection.classList.remove('hidden');
        resetState();
        nextQuestion();
      };

      introLaterBtn.onclick = function () {
        introSection.classList.add('hidden');
        resultSection.classList.remove('hidden');
        stateTagsEl.innerHTML = '';
        resultText.textContent = 'Noted. You do not have to go further right now.';
        resultTagline.textContent = 'You can come back when you want a small check-in, not a demand.';
      };

      yesBtn.onclick = function () {
        var q = questions[currentIndex];
        updateScores(q.yes);
        currentIndex += 1;
        if (currentIndex >= questions.length) {
          showResult();
        } else {
          nextQuestion();
        }
      };

      noBtn.onclick = function () {
        var q = questions[currentIndex];
        updateScores(q.no);
        currentIndex += 1;
        if (currentIndex >= questions.length) {
          showResult();
        } else {
          nextQuestion();
        }
      };

      acceptBtn.onclick = function () {
        // No external action yet; just a small acknowledgement hook for future use.
      };

      altBtn.onclick = function () {
        var primary = pickState();
        if (primary === 'needs_action' || primary === 'ready_for_step' || primary === 'avoidant_capable') {
          showResult('needs_pause');
        } else {
          showResult('needs_action');
        }
      };

      restartBtn.onclick = function () {
        resultSection.classList.add('hidden');
        introSection.classList.remove('hidden');
        resetState();
      };

      // Initial state
      resetState();
    })();
  </script>
</body>
</html>
